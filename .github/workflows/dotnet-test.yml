name: Run dotnet test

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: latest
          dotnet-channel: LTS
      - run: dotnet tool restore
      - run: dotnet test